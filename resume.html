<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangkuman Reservasi - Raja Ampat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/index.css">
    
    <style>
        body {
            background-color: #f0f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .resume-card {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .resume-title {
            text-align: center;
            color: #1a4d4d;
            font-size: 20px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .resume-data {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .data-row {
        display: flex;
        align-items: flex-start;
        border-bottom: 1px dashed #eee;
        padding-bottom: 12px;
        font-size: 15px;
    }
    .data-label {
        flex: 0 0 45%; /* Paksa lebar label tetap */
        color: #666;
        font-weight: 500;
    }
    .data-colon {
        flex: 0 0 5%; /* Ruang khusus titik dua */
        color: #333;
        font-weight: 600;
    }
    .data-value {
        flex: 1; /* Sisa ruang untuk isi teks */
        color: #333;
        font-weight: 600;
        text-align: right;
    }
    .total-row {
        margin-top: 10px;
        border-bottom: none;
        padding-top: 15px;
        border-top: 2px solid #1a4d4d;
    }
    .total-row .data-label, .total-row .data-colon, .total-row .data-value {
        color: #d9534f;
        font-size: 18px;
        font-weight: 700;
    }

        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }
        .btn-action {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-pesan-lagi {
            background: #1a4d4d;
            color: white;
            border: 1px solid #1a4d4d;
        }
        .btn-pesan-lagi:hover {
            background: #113333;
        }
        .btn-tidak {
            background: white;
            color: #666;
            border: 1px solid #ccc;
        }
        .btn-tidak:hover {
            background: #f9f9f9;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="resume-card">
        <h2 class="resume-title">Rangkuman Reservasi<br>Paket Wisata</h2>
        
        <div class="resume-data" id="resumeContainer">
            </div>

        <div class="action-buttons">
            <a href="order.html" class="btn-action btn-pesan-lagi">Pesan Lagi</a>
            <a href="index.html" class="btn-action btn-tidak" onclick="hapusCache()">Tidak</a>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Tarik data dari Local Storage
        const savedData = localStorage.getItem("latestReservation");
        
        // Proteksi: Kalau data kosong, balikin ke halaman order
        if (!savedData) {
            alert("Data pesanan kosong! Silakan isi form pesanan terlebih dahulu.");
            window.location.href = "order.html";
            return;
        }

        const data = JSON.parse(savedData);
        
        // 2. Definisiin elemen tempat data mau disuntik
        const container = document.getElementById("resumeContainer");

        // 3. Suntik HTML pake format Flexbox biar titik duanya rapi
        container.innerHTML = `
            <div class="data-row">
                <div class="data-label">Nama</div>
                <div class="data-colon">:</div>
                <div class="data-value">${data.nama}</div>
            </div>
            <div class="data-row">
                <div class="data-label">Jumlah Peserta</div>
                <div class="data-colon">:</div>
                <div class="data-value">${data.peserta} Orang</div>
            </div>
            <div class="data-row">
                <div class="data-label">Waktu Perjalanan</div>
                <div class="data-colon">:</div>
                <div class="data-value">${data.waktu} Hari</div>
            </div>
            <div class="data-row">
                <div class="data-label">Layanan Paket</div>
                <div class="data-colon">:</div>
                <div class="data-value" style="text-align: right;">${data.layanan}</div>
            </div>
            <div class="data-row">
                <div class="data-label">Harga Paket</div>
                <div class="data-colon">:</div>
                <div class="data-value">${data.hargaPaket}</div>
            </div>
            <div class="data-row total-row">
                <div class="data-label">Jumlah Tagihan</div>
                <div class="data-colon">:</div>
                <div class="data-value">${data.totalTagihan}</div>
            </div>
        `;

        // 4. Logika History (Simpan ke Profile jika user sudah login)
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (currentUser) {
            // Cegah duplikasi saat halaman di-refresh
            const isAlreadySaved = sessionStorage.getItem("orderSaved_" + data.nama);
            if (!isAlreadySaved) {
                let orderHistory = JSON.parse(localStorage.getItem("history_" + currentUser.username)) || [];
                
                // Tambahin tanggal order hari ini
                data.tanggalOrder = new Date().toLocaleDateString('id-ID');
                
                orderHistory.push(data);
                localStorage.setItem("history_" + currentUser.username, JSON.stringify(orderHistory));
                sessionStorage.setItem("orderSaved_" + data.nama, "true");
            }
        }
    });

    // 5. Bersihin cache pesanan saat ini kalau user klik "Tidak"
    function hapusCache() {
        localStorage.removeItem("latestReservation");
    }
</script>
</body>
</html>
