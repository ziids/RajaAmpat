<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Raja Ampat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-overlay">
        
        <nav class="navbar" id="navbar">
            <div class="nav-logo">
                <img src="./assets/images/logo/logo.png" alt="Raja Ampat Logo">
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="index.html#tentang">Tentang</a></li>
                <li><a href="index.html#destinasi">Destinasi</a></li>
                <li><a href="index.html#aktivitas">Aktivitas</a></li>
                <li><a href="index.html#galeri">Galeri</a></li>
                <li><a href="index.html#kontak">Kontak</a></li>
            </ul>
            <div class="nav-buttons" id="navButtonsContainer">
                <a href="register.html" class="nav-btn nav-btn-outline">Register</a>
                <a href="login.html" class="nav-btn nav-btn-filled">Login</a>
            </div>
        </nav>

        <main class="auth-main">
            <div class="auth-card">
                <h1 class="auth-title">Login</h1>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username or email address</label>
                        <input type="text" id="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Your password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" required>
                            <a href="#" class="hide-password">Hide</a>
                        </div>
                    </div>

                    <a href="#" target="_blank" class="forget-password">Forget your password</a>

                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
            </div>
        </main>

    </div>
    
    <script src="./assets/js/auth.js"></script>
</body>
</html>
