<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan Paket Wisata - Raja Ampat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
    <link rel="stylesheet" href="./assets/css/order.css">
</head>
<body class="auth-page">
    <div class="auth-overlay">
        
        <!-- NAVBAR -->
        <nav class="navbar scrolled" id="navbar">
            <div class="nav-logo">
                <img src="./assets/images/logo/logo.png" alt="Raja Ampat Logo">
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#beranda">Beranda</a></li>
                <li><a href="index.html#tentang">Tentang</a></li>
                <li><a href="index.html#destinasi">Destinasi</a></li>
                <li><a href="index.html#aktivitas">Aktivitas</a></li>
                <li><a href="index.html#galeri">Galeri</a></li>
                <li><a href="index.html#testimoni">Testimoni</a></li>
                <li><a href="index.html#paket">Paket Wisata</a></li>
                <li class="nav-mobile-buttons" id="navMobileButtonsContainer">
                    <a href="./register.html" class="nav-btn nav-btn-mobile">Register</a>
                    <a href="./login.html" class="nav-btn nav-btn-mobile">Login</a>
                </li>
            </ul>

            <div class="nav-buttons" id="navButtonsContainer">
                <a href="./register.html" class="nav-btn nav-btn-desktop">Register</a>
                <a href="./login.html" class="nav-btn nav-btn-desktop">Login</a>
            </div>

            <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
        <div class="nav-overlay" id="navOverlay"></div>
        

        <main class="auth-main" style="padding-top: 120px; padding-bottom: 50px;">
            <div class="auth-card" style="max-width: 600px; text-align: left;">
                <h1 class="auth-title" style="text-align: center; margin-bottom: 20px;">Form Pemesanan Paket Wisata</h1>
                
                <form id="orderForm">
                    <div class="form-group">
                        <label for="namaPemesan">Nama Pemesan</label>
                        <input type="text" id="namaPemesan" required disabled placeholder="Masukkan nama lengkap">
                    </div>

                    <div class="form-group">
                        <label for="nomorTelp">Nomor Telp/HP</label>
                        <input type="tel" id="nomorTelp" required placeholder="Contoh: 08123456789">
                    </div>

                    <div class="form-group">
                        <label for="waktuPerjalanan">Waktu Pelaksanaan Perjalanan (Hari)</label>
                        <input type="number" id="waktuPerjalanan" min="1" required placeholder="Contoh: 2">
                    </div>

                    <div class="form-group">
                        <label for="jumlahPeserta">Jumlah Peserta</label>
                        <input type="number" id="jumlahPeserta" min="1" required placeholder="Contoh: 2">
                    </div>

                    <div class="form-group">
                        <label>Pilihan Paket Perjalanan</label>
                        <div class="checkbox-group">
                            
                            <label class="checkbox-item" style="display: flex; align-items: center; gap: 15px;">
                                <input type="radio" name="paketWisata" class="layanan-radio" value="1000000" id="paketHemat" required style="margin-top: 5px;">
                                <div>
                                    <strong style="display: block; color: #1a4d4d;">Paket Hemat (Rp 1.000.000 / hari)</strong>
                                    <span style="font-size: 13px; color: #666; display: block; margin-top: 4px;">Fasilitas: Homestay, transport reguler, makan 2x sehari.</span>
                                </div>
                            </label>

                            <label class="checkbox-item" style="display: flex; align-items: center; gap: 15px;">
                                <input type="radio" name="paketWisata" class="layanan-radio" value="1500000" id="paketSantai" style="margin-top: 5px;">
                                <div>
                                    <strong style="display: block; color: #1a4d4d;">Paket Santai (Rp 1.500.000 / hari)</strong>
                                    <span style="font-size: 13px; color: #666; display: block; margin-top: 4px;">Fasilitas: Hotel standar, snorkeling, makan 3x sehari.</span>
                                </div>
                            </label>

                            <label class="checkbox-item" style="display: flex; align-items: center; gap: 15px;">
                                <input type="radio" name="paketWisata" class="layanan-radio" value="2500000" id="paketPuas" style="margin-top: 5px;">
                                <div>
                                    <strong style="display: block; color: #1a4d4d;">Paket Puas (Rp 2.500.000 / hari)</strong>
                                    <span style="font-size: 13px; color: #666; display: block; margin-top: 4px;">Fasilitas: Resort premium, diving, drone, makan 3x sehari.</span>
                                </div>
                            </label>

                        </div>
                    </div>

                    <div class="form-group">
                        <label for="hargaPaket">Harga Paket Perjalanan</label>
                        <input type="text" id="hargaPaket" readonly value="Rp 0">
                    </div>

                    <div class="form-group">
                        <label for="jumlahTagihan">Jumlah Tagihan</label>
                        <input type="text" id="jumlahTagihan" readonly value="Rp 0">
                    </div>

                    <div class="btn-container">
                        <a href="index.html" class="btn-cancel">Batal</a>
                        <button type="submit" class="btn-primary" style="margin-top: 0;">Simpan</button>
                    </div>
                </form>
            </div>
        </main>

    </div>

    <script src="./assets/js/order.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/navbar.js"></script>
</body>
</html>
